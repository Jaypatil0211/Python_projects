{% extends 'base.html' %}

{% block title %}Login - R66shop{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container auth-container">
        <h1>🏁 Login</h1>
        <p class="auth-subtitle">Welcome back, racer!</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-submit">Login</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
    </div>
</section>
{% endblock %}
